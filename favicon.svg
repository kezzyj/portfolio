<svg xmlns="http://www.w3.org/2000/svg" viewBox="55 25 70 65" width="100" height="100">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- EXACT hexagon from original logo - no background -->
  <polygon points="75,30 105,30 120,56 105,82 75,82 60,56"
           fill="none" stroke="url(#cyanGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- EXACT K shape from original logo -->
  <g fill="url(#cyanGrad)" filter="url(#glow)">
    <rect x="68" y="40" width="5" height="32" rx="1"/>
    <polygon points="73,56 88,40 94,40 79,56"/>
    <polygon points="73,56 88,72 94,72 79,56"/>
  </g>

  <!-- EXACT corner dots from original logo -->
  <circle cx="60" cy="56" r="2" fill="#00E5FF" opacity="0.6"/>
  <circle cx="120" cy="56" r="2" fill="#00E5FF" opacity="0.6"/>

</svg>
